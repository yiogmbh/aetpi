
name: test stuff
on:
  pull_request:
    branches:
      - main

jobs:
  echo:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: setup uv
        uses: astral-sh/setup-uv@v8.0.0
      - name: setup git-cliff
        uses: taiki-e/install-action@git-cliff

      - name: checks
        id: checks
        uses: ./.github/actions/cliff-version


      - name: output values
        run: |
          echo "${{ steps.checks.outputs.bumped }} <-- ${{ steps.checks.outputs.current }}"
      - name: echo if release
        if: ${{ steps.checks.outputs.requires_release }}
        run: |
          echo "Yes a new release is coming"
